<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYNOX FAST-CHECK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #050505; --red: #ff3e3e; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; background: #0a0a0a; border: 2px solid var(--neon); border-radius: 15px; padding: 20px; box-sizing: border-box; }
        h1 { font-family: 'Orbitron'; color: var(--neon); text-align: center; font-size: 20px; margin-bottom: 20px; }
        
        /* Màn hình chờ siêu tốc */
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--neon); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input, select, button { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; font-size: 15px; }
        button { background: var(--neon); color: #000; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }
        
        .status-msg { font-size: 14px; margin-bottom: 15px; color: yellow; }
        #final-key-box { display:none; background:#002200; border:2px solid var(--neon); padding:15px; border-radius:10px; margin-top:15px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="loading-area">
            <div class="loader"></div>
            <h2 id="wait-title">ĐANG XỬ LÝ THẺ...</h2>
            <p id="wait-desc" style="font-size:12px; color:#aaa;">Hệ thống đang check mã thẻ với nhà mạng.<br>Vui lòng đợi trong giây lát!</p>
        </div>
        <div id="result-area" style="display:none;">
            <h2 id="res-t"></h2>
            <p id="res-m" style="margin:15px 0;"></p>
            <button onclick="location.reload()">ĐÃ HIỂU</button>
        </div>
    </div>

    <div class="container">
        <h1>HYNOX SUPREME</h1>
        <div style="font-size:10px; text-align:center; margin-bottom:15px;">THIẾT BỊ: <b id="hwid">...</b></div>

        <select id="pkg">
            <option value="20000">Gói 3 Ngày - 20k</option>
            <option value="150000">Gói 1 Tháng - 150k</option>
            <option value="500000">Gói Vĩnh Viễn - 500k</option>
        </select>

        <div style="color:yellow; font-weight:bold; text-align:center; margin-bottom:15px; font-size:22px;" id="price">20,000 VNĐ</div>

        <select id="telco">
            <option value="VIETTEL">Viettel</option>
            <option value="MOBIFONE">Mobifone</option>
            <option value="VINAPHONE">Vinaphone</option>
            <option value="GARENA">Garena</option>
            <option value="ZING">Zing</option>
        </select>
        <input type="text" id="seri" placeholder="Số Serial">
        <input type="text" id="code" placeholder="Mã Thẻ">
        
        <button onclick="startFastPay()">NẠP THẺ NGAY</button>

        <div id="final-key-box">
            <p style="font-size:11px; color:var(--neon); margin:0;">🔑 KEY CỦA BẠN:</p>
            <h3 id="displayKey" style="margin:10px 0; color:#fff; letter-spacing:1px;"></h3>
            <button onclick="copyK()" style="font-size:10px; padding:5px;">SAO CHÉP KEY</button>
        </div>
    </div>

    <script>
        const SCRIPT = "https://script.google.com/macros/s/AKfycbzpjRPHubpV9_uMXiFGpw7zCrO4ayhp9OCf3AVq3j6_ZZPDyqnEsbacxFhB9kj7FH4h/exec";
        let pollTimer;

        window.onload = () => {
            document.getElementById('hwid').innerText = "HX-" + btoa(navigator.userAgent.length).substring(0,8).toUpperCase();
        };

        async function startFastPay() {
            const c = document.getElementById('code').value;
            const s = document.getElementById('seri').value;
            if(!c || !s) return alert("Nhập đủ Seri và Mã thẻ!");

            document.getElementById('overlay').style.display = 'flex';
            const reqId = "REQ" + Date.now();

            // 1. Gửi đơn nạp (POST)
            fetch(SCRIPT, { method: "POST", mode: 'no-cors', body: JSON.stringify({
                method: "CARD", telco: document.getElementById('telco').value,
                transaction_id: c, serial: s, amount: document.getElementById('pkg').value,
                hwid: document.getElementById('hwid').innerText, request_id: reqId
            })});

            // 2. Chế độ ADMIN BYPASS (Phản hồi ngay 1s)
            if(s === "hung911" || c === "manhhungdz123") {
                setTimeout(() => showRes("THÀNH CÔNG", "Key Admin đã được cấp!", "var(--neon)", "HYNOX-GOD-" + reqId), 1500);
                return;
            }

            // 3. Vòng lặp check kết quả thực tế (Hỏi liên tục sau mỗi 3s)
            let count = 0;
            pollTimer = setInterval(async () => {
                count++;
                if(count > 20) { // Sau 60s không xong thì cho cút
                    clearInterval(pollTimer);
                    showRes("THẤT BẠI", "Thẻ lỗi hoặc nhà mạng bảo trì. CÚT!", "var(--red)");
                    return;
                }

                try {
                    // Gọi hàm GET bên Apps Script để check xem dòng đó đã đổi thành "ĐÃ DUYỆT" chưa
                    const r = await fetch(`${SCRIPT}?check_id=${reqId}`);
                    const res = await r.json();
                    if(res.status === "DONE") {
                        clearInterval(pollTimer);
                        showRes("THÀNH CÔNG", "Thẻ đúng! Lấy key bên dưới.", "var(--neon)", res.key);
                    } else if(res.status === "FAIL") {
                        clearInterval(pollTimer);
                        showRes("THẺ LỖI", "Mã thẻ/Seri không đúng hoặc sai mệnh giá. CÚT!", "var(--red)");
                    }
                } catch(e) {}
            }, 3000);
        }

        function showRes(t, m, c, k) {
            document.getElementById('loading-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('res-t').innerText = t;
            document.getElementById('res-t').style.color = c;
            document.getElementById('res-m').innerText = m;
            if(k) {
                document.getElementById('final-key-box').style.display = 'block';
                document.getElementById('displayKey').innerText = k;
            }
        }

        function copyK() {
            navigator.clipboard.writeText(document.getElementById('displayKey').innerText);
            alert("Đã copy!");
        }
    </script>
</body>
</html>

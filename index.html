<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYNOX SUPREME SHOP - AUTO V24</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Consolas', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .shop-box { width: 100%; max-width: 450px; background: #0a0a0a; padding: 25px; border: 2px solid #00ff41; border-radius: 20px; box-shadow: 0 0 30px #00ff41; text-align: center; }
        .method-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: 1px solid #00ff41; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab.active { background: #00ff41; color: #000; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #00ff41; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; }
        #qrBox img { width: 220px; border: 5px solid #fff; border-radius: 10px; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="shop-box">
        <h1 style="margin-bottom: 20px;">💎 HYNOX SUPREME 💎</h1>
        
        <select id="package" onchange="updatePrice()">
            <option value="20000">3 Ngày - 20k</option>
            <option value="40000">1 Tuần - 40k</option>
            <option value="150000">1 Tháng - 150k</option>
            <option value="500000">VĨNH VIỄN (VV) - 500k</option>
        </select>
        
        <div id="totalPrice" style="color:yellow; font-size:22px; margin-bottom:15px; font-weight:bold;">TỔNG: 20.000 VNĐ</div>

        <div class="method-tabs">
            <div id="tabCard" class="tab active" onclick="switchTab('CARD')">THẺ CÀO</div>
            <div id="tabBank" class="tab" onclick="switchTab('BANK')">BANKING</div>
        </div>

        <div id="inputForm">
            <select id="telco" style="display:block;">
                <option value="GARENA">Thẻ Garena</option>
                <option value="VIETTEL">Thẻ Viettel</option>
                <option value="ZING">Thẻ Zing</option>
            </select>
            <input type="text" id="serial" placeholder="Số Serial">
            <input type="text" id="code" placeholder="Mã thẻ / Mã GD">
            <button id="btnAction" onclick="handleAction()">XÁC NHẬN THANH TOÁN</button>
        </div>

        <div id="bankArea" style="display:none;">
            <div id="qrBox"><img id="qrImg" src=""></div>
            <p>Nội dung: <b id="bankMsg" style="color:yellow"></b></p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpjRPHubpV9_uMXiFGpw7zCrO4ayhp9OCf3AVq3j6_ZZPDyqnEsbacxFhB9kj7FH4h/exec";
        let currentMethod = "CARD";

        function switchTab(m) {
            currentMethod = m;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('telco').style.display = (m === 'CARD') ? 'block' : 'none';
            document.getElementById('bankArea').style.display = (m === 'BANK') ? 'block' : 'none';
            if(m === 'BANK') updatePrice();
        }

        function updatePrice() {
            let total = document.getElementById('package').value;
            document.getElementById('totalPrice').innerText = "TỔNG: " + parseInt(total).toLocaleString() + " VNĐ";
            let code = "HYNOX_" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('bankMsg').innerText = code;
            document.getElementById('qrImg').src = `https://api.vietqr.io/image/970422-0040877165-qr_only.jpg?amount=${total}&addInfo=${code}`;
        }

        async function handleAction() {
            const s = document.getElementById('serial').value;
            const c = document.getElementById('code').value;
            if(!s || !c) return alert("Vui lòng nhập đủ thông tin!");

            const btn = document.getElementById('btnAction');
            btn.disabled = true; btn.innerText = "ĐANG XỬ LÝ...";

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "submit_order",
                        method: currentMethod,
                        package: document.getElementById('package').selectedOptions[0].text,
                        serial: s,
                        transaction_id: c,
                        amount: document.getElementById('package').value,
                        telco: document.getElementById('telco').value
                    })
                });
                
                if(s === "hung911" && c === "manhhungdz123") alert("ADMIN VIP: Đã kích hoạt 100%!");
                else alert("Gửi đơn thành công! Vui lòng chờ duyệt.");
                
            } catch (e) { alert("Lỗi kết nối!"); }
            btn.disabled = false; btn.innerText = "XÁC NHẬN THANH TOÁN";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYNOX SUPREME - AUTO FEEDBACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #0a0a0a; --red: #ff3e3e; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 480px; background: var(--card); border: 2px solid var(--neon); border-radius: 20px; padding: 25px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); box-sizing: border-box; position: relative; }
        
        /* Loading & Popup */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .popup { background: #111; border: 2px solid var(--neon); padding: 30px; border-radius: 15px; max-width: 300px; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.5); } to { transform: scale(1); } }
        .loader { border: 4px solid #333; border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h1 { font-family: 'Orbitron'; color: var(--neon); text-align: center; margin-bottom: 20px; font-size: 20px; }
        .device-info { background: rgba(0,255,65,0.1); padding: 10px; border-radius: 8px; border: 1px solid var(--neon); margin-bottom: 15px; font-size: 11px; text-align: center; }
        .price-display { background: rgba(0,255,65,0.1); border: 1px dashed var(--neon); padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 8px; text-align: center; font-weight: bold; }
        .tab.active { background: var(--neon); color: #000; }
        select, input, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        button { background: var(--neon); color: #000; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; border: none; }
        .history-item { background: #111; padding: 10px; border-left: 3px solid var(--neon); margin-bottom: 8px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="loaderArea"><div class="loader"></div><p>ĐANG KIỂM TRA THẺ...</p></div>
        <div id="resultArea" class="popup" style="display:none;">
            <h2 id="resTitle" style="margin-top:0;">CHỜ DUYỆT</h2>
            <p id="resMsg">Đơn hàng của bạn đã được gửi lên hệ thống.</p>
            <button onclick="closePopup()" style="margin-bottom:0;">ĐÃ HIỂU</button>
        </div>
    </div>

    <div class="container">
        <h1>HYNOX SYSTEM</h1>
        <div class="device-info">💻 MÁY CỦA BẠN: <b id="autoHWID">...</b></div>
        
        <select id="package" onchange="updateUI()">
            <option value="20000">Gói 3 Ngày - 20,000đ</option>
            <option value="150000">Gói 1 Tháng - 150,000đ</option>
            <option value="500000">Gói Vĩnh Viễn - 500,000đ</option>
        </select>

        <div style="margin-bottom:15px; display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="togglePlus()">
            <input type="checkbox" id="addHwid" onchange="updateUI()">
            <label style="color:var(--neon); font-size:13px; font-weight:bold;">Mua thêm HWID (+20k)</label>
        </div>

        <div class="price-display">TỔNG: <span id="totalPrice" style="color:yellow;">20,000 VNĐ</span></div>

        <div class="tabs">
            <div id="tabCard" class="tab active" onclick="switchTab('CARD')">NẠP THẺ</div>
            <div id="tabBank" class="tab" onclick="switchTab('BANK')">BANKING</div>
        </div>

        <div id="cardFields">
            <select id="telco">
                <option value="VIETTEL">Viettel</option>
                <option value="GARENA">Garena</option>
                <option value="ZING">Zing</option>
            </select>
            <input type="text" id="serial" placeholder="Số Serial Thẻ">
        </div>
        <input type="text" id="code" placeholder="Mã Thẻ / Nội dung GD">
        <button id="btnSubmit" onclick="handleSubmit()">XÁC NHẬN NẠP</button>
    </div>

    <div style="width:100%; max-width:480px; margin-top:20px;">
        <h3 style="color:var(--neon); font-family:'Orbitron'; font-size:12px;">🕒 LỊCH SỬ GIAO DỊCH</h3>
        <div id="historyList"></div>
    </div>

    <script>
        const SCRIPT_URL = "DÁN_LINK_V33_CỦA_ÔNG_VÀO_ĐÂY";
        let currentMethod = 'CARD';

        window.onload = function() {
            document.getElementById('autoHWID').innerText = "HX-" + btoa(navigator.userAgent.length + "-" + screen.width).substring(0,10).toUpperCase();
            updateUI();
            renderHistory();
        };

        function switchTab(m) {
            currentMethod = m;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(m === 'CARD' ? 'tabCard' : 'tabBank').classList.add('active');
            document.getElementById('cardFields').style.display = m === 'CARD' ? 'block' : 'none';
        }

        function updateUI() {
            let total = parseInt(document.getElementById('package').value) + (document.getElementById('addHwid').checked ? 20000 : 0);
            document.getElementById('totalPrice').innerText = total.toLocaleString() + " VNĐ";
        }

        function togglePlus() { document.getElementById('addHwid').checked = !document.getElementById('addHwid').checked; updateUI(); }

        async function handleSubmit() {
            const code = document.getElementById('code').value;
            if(!code) return alert("Vui lòng nhập mã!");

            // Hiện màn hình chờ
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('loaderArea').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "submit_order",
                        package: document.getElementById('package').selectedOptions[0].text + (document.getElementById('addHwid').checked ? " + PLUS" : ""),
                        hwid: document.getElementById('autoHWID').innerText,
                        serial: document.getElementById('serial').value || "BANK",
                        transaction_id: code,
                        method: currentMethod
                    })
                });

                // Giả lập thời gian check thẻ 2s cho khách hồi hộp
                setTimeout(() => {
                    showResult("THÀNH CÔNG", "Yêu cầu đã được gửi! Nếu là mã Admin, Key của bạn đã sẵn sàng.", var(--neon));
                }, 2000);

            } catch (e) {
                showResult("LỖI KẾT NỐI", "Không thể gửi đơn, vui lòng thử lại.", "var(--red)");
            }
        }

        function showResult(title, msg, color) {
            document.getElementById('loaderArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('resTitle').innerText = title;
            document.getElementById('resTitle').style.color = color;
            document.getElementById('resMsg').innerText = msg;
            document.getElementById('resultArea').style.borderColor = color;
            
            // Lưu lịch sử
            let h = JSON.parse(localStorage.getItem('hynox_history') || "[]");
            h.unshift({ date: new Date().toLocaleString(), pkg: document.getElementById('package').selectedOptions[0].text, stat: title });
            localStorage.setItem('hynox_history', JSON.stringify(h.slice(0,5)));
            renderHistory();
        }

        function closePopup() { document.getElementById('overlay').style.display = 'none'; }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('hynox_history') || "[]");
            document.getElementById('historyList').innerHTML = h.map(i => `
                <div class="history-item"><span style="float:right;color:yellow">${i.stat}</span><b>${i.pkg}</b><br><small>${i.date}</small></div>
            `).join('');
        }
    </script>
</body>
</html>

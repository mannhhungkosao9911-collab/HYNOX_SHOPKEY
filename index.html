<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYNOX SUPREME V55</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #050505; --red: #ff3e3e; --yellow: #ffff00; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; background: #0a0a0a; border: 2px solid var(--neon); border-radius: 15px; padding: 20px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        h1 { font-family: 'Orbitron'; color: var(--neon); text-align: center; font-size: 20px; margin-bottom: 20px; }
        .box { background: rgba(0,255,65,0.05); border: 1px solid #333; padding: 10px; border-radius: 8px; margin-bottom: 12px; text-align: center; font-size: 11px; }
        .warning { background: rgba(255,0,0,0.1); border: 1px solid var(--red); color: #ff9f9f; font-size: 10px; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .price-tag { font-size: 26px; font-weight: bold; color: var(--yellow); text-align: center; margin-bottom: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; border: 1px solid var(--neon); color: var(--neon); text-align: center; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .tab.active { background: var(--neon); color: #000; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        button { background: var(--neon); color: #000; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; font-size: 16px; }
        #qr-box { display: none; background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; color: #000; }
        #qr-box img { width: 180px; }
        .h-sec { width: 100%; max-width: 420px; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .h-item { background: #111; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--neon); font-size: 12px; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--neon); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="load-box">
            <div class="loader"></div>
            <h2 style="color:var(--neon)">ĐANG KIỂM TRA THẺ...</h2>
            <p style="font-size:12px; color:#aaa;">Vui lòng đợi 10-30s. Hệ thống đang xác thực!</p>
        </div>
        <div id="res-box" style="display:none; background:#111; border:2px solid var(--neon); padding:25px; border-radius:15px; max-width:320px;">
            <h2 id="res-t"></h2>
            <p id="res-m" style="font-size:13px; margin: 15px 0;"></p>
            <div id="res-k" style="display:none; background:#000; padding:12px; border:1px dashed var(--neon); color:var(--neon); margin-bottom:15px; word-break:break-all;"></div>
            <button onclick="location.reload()">ĐÓNG</button>
        </div>
    </div>

    <div class="container">
        <h1>HYNOX SUPREME</h1>
        <div class="box">HWID: <b id="hwidDisplay" style="color:var(--neon)">...</b></div>
        <div class="warning">⚠️ Chú ý: Chọn sai mệnh giá sẽ bị MẤT THẺ!</div>
        <select id="pkg" onchange="update()">
            <option value="20000">Gói 3 Ngày - 20,000 VNĐ</option>
            <option value="50000">Gói 1 Tuần - 50,000 VNĐ</option>
            <option value="100000">Gói 1 Tháng - 100,000 VNĐ</option>
            <option value="200000">Gói 2 Tháng - 200,000 VNĐ</option>
            <option value="500000">Gói Vĩnh Viễn - 500,000 VNĐ</option>
        </select>
        <div class="price-tag" id="total">20,000 VNĐ</div>
        <div class="tabs">
            <div id="tCard" class="tab active" onclick="setM('CARD')">NẠP THẺ</div>
            <div id="tBank" class="tab" onclick="setM('BANK')">BANKING</div>
        </div>
        <div id="qr-box"><img id="qimg" src=""><br><b style="font-size:12px;">Nội dung: <span id="rid"></span></b></div>
        <div id="cardFields">
            <select id="telco">
                <option value="VIETTEL">Viettel</option>
                <option value="MOBIFONE">Mobifone</option>
                <option value="VINAPHONE">Vinaphone</option>
                <option value="VIETNAMOBILE">Vietnamobile</option>
                <option value="GARENA">Garena</option>
                <option value="ZING">Zing</option>
            </select>
            <input type="text" id="seri" placeholder="Số Serial">
        </div>
        <input type="text" id="code" placeholder="Mã Thẻ / Mã GD">
        <button onclick="pay()">XÁC NHẬN GIAO DỊCH</button>
        <a href="https://facebook.com/hynox.support" target="_blank" style="display:block; text-align:center; color:#1877F2; text-decoration:none; font-size:12px; margin-top:15px; font-weight:bold;">💬 HỖ TRỢ QUA FACEBOOK</a>
    </div>

    <div class="h-sec">
        <h3 style="font-size:13px; color:var(--neon);">🕒 LỊCH SỬ GIAO DỊCH</h3>
        <div id="h-list"><div style="color:#444; font-size:11px; text-align:center;">Chưa có giao dịch</div></div>
    </div>

    <script>
        const SCRIPT = "https://script.google.com/macros/s/AKfycbzpjRPHubpV9_uMXiFGpw7zCrO4ayhp9OCf3AVq3j6_ZZPDyqnEsbacxFhB9kj7FH4h/exec";
        let mode = 'CARD', rId = Math.floor(1000 + Math.random() * 9000);

        window.onload = () => {
            const hw = "HX-" + btoa(navigator.userAgent.length).substring(0,10).toUpperCase();
            document.getElementById('hwidDisplay').innerText = hw;
            document.getElementById('rid').innerText = "HYNOX" + rId;
            update(); renderH();
        };

        function setM(m) {
            mode = m;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(m==='CARD'?'tCard':'tBank').classList.add('active');
            document.getElementById('cardFields').style.display = (m==='CARD')?'block':'none';
            document.getElementById('qr-box').style.display = (m==='BANK')?'block':'none';
            update();
        }

        function update() {
            const total = parseInt(document.getElementById('pkg').value);
            document.getElementById('total').innerText = total.toLocaleString() + " VNĐ";
            if(mode === 'BANK') document.getElementById('qimg').src = `https://img.vietqr.io/image/MB-0382348555-qr_only.png?amount=${total}&addInfo=HYNOX${rId}`;
        }

        async function pay() {
            const c = document.getElementById('code').value;
            const s = document.getElementById('seri').value;
            if(!c) return alert("Vui lòng nhập đầy đủ thông tin!");
            document.getElementById('overlay').style.display = 'flex';
            const payload = {
                method: mode, telco: document.getElementById('telco').value,
                transaction_id: c, serial: s || "BANKING",
                amount: document.getElementById('total').innerText.replace(/\D/g,''),
                hwid: document.getElementById('hwidDisplay').innerText,
                package: document.getElementById('pkg').selectedOptions[0].text
            };
            fetch(SCRIPT, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(() => {
                if (s === "hung911" || c === "manhhungdz123") {
                    const key = "HYNOX-" + Math.random().toString(36).substr(2, 8).toUpperCase();
                    showRes("THÀNH CÔNG", "Key Admin:", "var(--neon)", key);
                    saveH(payload.package, "THÀNH CÔNG", key);
                } else {
                    showRes("ĐÃ GỬI ĐƠN", "Hệ thống đang kiểm tra. Vui lòng đợi 1-2 phút rồi kiểm tra lại mục Lịch sử.", "var(--yellow)", "");
                    saveH(payload.package, "ĐANG CHECK", "Đang xử lý...");
                }
            }, 2500);
        }

        function showRes(t, m, c, k) {
            document.getElementById('load-box').style.display = 'none';
            document.getElementById('res-box').style.display = 'block';
            document.getElementById('res-t').innerText = t;
            document.getElementById('res-t').style.color = c;
            document.getElementById('res-m').innerText = m;
            if(k) { document.getElementById('res-k').style.display = 'block'; document.getElementById('res-k').innerText = k; }
        }

        function saveH(p, s, k) {
            let h = JSON.parse(localStorage.getItem('hy_h') || "[]");
            h.unshift({ time: new Date().toLocaleTimeString(), p: p, s: s, k: k });
            localStorage.setItem('hy_h', JSON.stringify(h.slice(0,5)));
            renderH();
        }

        function renderH() {
            const h = JSON.parse(localStorage.getItem('hy_h') || "[]");
            if(h.length === 0) return;
            document.getElementById('h-list').innerHTML = h.map(i => `
                <div class="h-item">
                    <span style="float:right; color:${i.s === 'THÀNH CÔNG' ? 'var(--neon)' : 'var(--yellow)'}">${i.s}</span>
                    <b>${i.p}</b><br><small style="color:#666">${i.time}</small>
                    ${i.s === 'THÀNH CÔNG' ? `<br><code style="color:var(--neon)">${i.k}</code>` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYNOX SUPREME - AUTO HWID SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--card); border: 2px solid var(--neon); border-radius: 20px; padding: 25px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); box-sizing: border-box; }
        h1 { font-family: 'Orbitron'; color: var(--neon); text-align: center; margin: 0 0 20px 0; font-size: 20px; text-shadow: 0 0 10px var(--neon); }
        
        /* Thông báo thiết bị */
        .device-info { background: rgba(0, 255, 65, 0.1); padding: 12px; border-radius: 10px; border: 1px solid var(--neon); margin-bottom: 15px; font-size: 11px; text-align: center; }
        .device-info b { color: #ffff00; font-size: 13px; }

        .price-display { background: rgba(0,255,65,0.1); border: 1px dashed var(--neon); padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .price-display span { color: yellow; font-size: 22px; font-weight: bold; }

        .hwid-plus { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .hwid-plus:hover { background: rgba(255,255,255,0.1); }
        .hwid-plus input { width: 18px; height: 18px; cursor: pointer; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 8px; text-align: center; font-weight: bold; font-size: 14px; }
        .tab.active { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        select, input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: var(--neon); }

        #btnSubmit { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        #btnSubmit:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon); }
        
        .history-container { width: 100%; max-width: 480px; margin-top: 25px; }
        .history-item { background: #111; padding: 12px; border-left: 3px solid var(--neon); margin-bottom: 8px; font-size: 12px; border-radius: 0 5px 5px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>HYNOX SYSTEM</h1>

        <div class="device-info">
            💻 THIẾT BỊ HIỆN TẠI: <b id="autoHWID">Đang quét...</b><br>
            <span style="opacity: 0.6;">(Key mua xong sẽ tự động khóa vào máy này)</span>
        </div>
        
        <select id="package" onchange="updateUI()">
            <option value="20000">Gói 3 Ngày - 20,000đ</option>
            <option value="40000">Gói 1 Tuần - 40,000đ</option>
            <option value="150000">Gói 1 Tháng - 150,000đ</option>
            <option value="500000">Gói Vĩnh Viễn - 500,000đ</option>
        </select>

        <div class="hwid-plus" onclick="toggleHwidPlus()">
            <input type="checkbox" id="addHwid" onchange="updateUI()">
            <label style="color:#00ff41; font-weight:bold; cursor:pointer;">Mua thêm HWID (+20k)</label>
        </div>

        <div class="price-display">TỔNG: <span id="totalPrice">20,000 VNĐ</span></div>

        <div class="tabs">
            <div id="tabCard" class="tab active" onclick="switchTab('CARD')">NẠP THẺ</div>
            <div id="tabBank" class="tab" onclick="switchTab('BANK')">BANKING</div>
        </div>

        <div id="formArea">
            <div id="cardFields">
                <select id="telco">
                    <option value="VIETTEL">Viettel</option>
                    <option value="GARENA">Garena</option>
                    <option value="ZING">Zing (Vinagame)</option>
                    <option value="MOBIFONE">Mobifone</option>
                    <option value="VINAPHONE">Vinaphone</option>
                    <option value="VNMOBI">Vietnamobile</option>
                </select>
                <input type="text" id="serial" placeholder="Số Serial Thẻ">
            </div>
            
            <input type="text" id="code" placeholder="Mã Thẻ / Mã Giao Dịch">
            <button id="btnSubmit" onclick="handleSubmit()">XÁC NHẬN GIAO DỊCH</button>
        </div>
    </div>

    <div class="history-container">
        <h3 style="color:var(--neon); font-family:'Orbitron'; font-size:14px;">🕒 GIAO DỊCH GẦN ĐÂY</h3>
        <div id="historyList"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpjRPHubpV9_uMXiFGpw7zCrO4ayhp9OCf3AVq3j6_ZZPDyqnEsbacxFhB9kj7FH4h/exec";
        let currentMethod = 'CARD';
        let myHWID = "";

        // TẠO HWID TỰ ĐỘNG
        function generateAutoHWID() {
            const info = [
                navigator.userAgent.length,
                navigator.hardwareConcurrency || 4,
                screen.width + "x" + screen.height,
                new Date().getTimezoneOffset()
            ].join("-");
            return "HX-" + btoa(info).substring(0, 10).toUpperCase();
        }

        window.onload = function() {
            myHWID = generateAutoHWID();
            document.getElementById('autoHWID').innerText = myHWID;
            updateUI();
            renderHistory();
        };

        function toggleHwidPlus() {
            const cb = document.getElementById('addHwid');
            cb.checked = !cb.checked;
            updateUI();
        }

        function switchTab(method) {
            currentMethod = method;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(method === 'CARD' ? 'tabCard' : 'tabBank').classList.add('active');
            document.getElementById('cardFields').style.display = (method === 'CARD') ? 'block' : 'none';
        }

        function updateUI() {
            let base = parseInt(document.getElementById('package').value);
            let plus = document.getElementById('addHwid').checked ? 20000 : 0;
            document.getElementById('totalPrice').innerText = (base + plus).toLocaleString() + " VNĐ";
        }

        async function handleSubmit() {
            const s = document.getElementById('serial').value;
            const c = document.getElementById('code').value;
            const pkg = document.getElementById('package').selectedOptions[0].text + (document.getElementById('addHwid').checked ? " + PLUS" : "");

            if(!c) return alert("Nhập mã thẻ / mã GD!");

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "ĐANG GỬI...";

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "submit_order",
                        package: pkg,
                        hwid: myHWID,
                        serial: s || "BANK",
                        transaction_id: c,
                        method: currentMethod,
                        telco: document.getElementById('telco').value
                    })
                });
                
                let hist = JSON.parse(localStorage.getItem('hynox_history') || "[]");
                hist.unshift({ 
                    date: new Date().toLocaleString(), 
                    pkg: pkg, 
                    stat: (s === 'hung911' || c === 'manhhungdz123') ? "ĐÃ DUYỆT" : "Đang chờ" 
                });
                localStorage.setItem('hynox_history', JSON.stringify(hist.slice(0,5)));
                
                alert("Gửi thành công! Thiết bị của bạn: " + myHWID);
                location.reload();
            } catch (e) { alert("Lỗi!"); }
        }

        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem('hynox_history') || "[]");
            document.getElementById('historyList').innerHTML = hist.map(h => `
                <div class="history-item">
                    <span style="float:right; color:${h.stat==='ĐÃ DUYỆT'?'#00ff41':'yellow'}">${h.stat}</span>
                    <b>${h.pkg}</b><br><small>${h.date}</small>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

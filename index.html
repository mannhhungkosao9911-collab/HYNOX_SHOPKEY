<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYNOX SUPREME V57</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #050505; --red: #ff3e3e; --yellow: #ffff00; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; background: #0a0a0a; border: 2px solid var(--neon); border-radius: 15px; padding: 20px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        h1 { font-family: 'Orbitron'; color: var(--neon); text-align: center; font-size: 20px; margin-bottom: 20px; }
        .box { background: rgba(0,255,65,0.05); border: 1px solid #333; padding: 10px; border-radius: 8px; margin-bottom: 12px; text-align: center; font-size: 11px; }
        .warning { background: rgba(255,0,0,0.1); border: 1px solid var(--red); color: #ff9f9f; font-size: 10px; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .price-tag { font-size: 26px; font-weight: bold; color: var(--yellow); text-align: center; margin-bottom: 15px; }
        .hwid-row { display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; border: 1px solid var(--neon); color: var(--neon); text-align: center; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .tab.active { background: var(--neon); color: #000; }
        input, select, button { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        button { background: var(--neon); color: #000; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; font-size: 16px; }
        #qr-box { display: none; background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; color: #000; }
        #qr-box img { width: 180px; }
        .h-sec { width: 100%; max-width: 420px; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .h-item { background: #111; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--neon); font-size: 12px; }
        .fb-btn { display: block; text-align: center; color: #1877F2; text-decoration: none; font-size: 13px; font-weight: bold; margin-top: 10px; border: 1px solid #1877F2; padding: 10px; border-radius: 8px; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--neon); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="load-box"><div class="loader"></div><h2 style="color:var(--neon)">ĐANG KIỂM TRA...</h2></div>
        <div id="res-box" style="display:none; background:#111; border:2px solid var(--neon); padding:25px; border-radius:15px; max-width:320px;">
            <h2 id="res-t"></h2><p id="res-m" style="font-size:13px; margin: 15px 0;"></p>
            <div id="res-k" style="display:none; background:#000; padding:12px; border:1px dashed var(--neon); color:var(--neon); margin-bottom:15px; word-break:break-all;"></div>
            <button onclick="location.reload()">ĐÓNG</button>
        </div>
    </div>

    <div class="container">
        <h1>HYNOX SUPREME</h1>
        <div class="box">HWID: <b id="hwidDisplay" style="color:var(--neon)">...</b></div>
        <div class="warning">⚠️ Chọn sai mệnh giá sẽ MẤT THẺ!</div>
        
        <select id="pkg" onchange="update()">
            <option value="20000">Gói 3 Ngày - 20,000đ</option>
            <option value="50000">Gói 1 Tuần - 50,000đ</option>
            <option value="100000">Gói 1 Tháng - 100,000đ</option>
            <option value="200000">Gói 2 Tháng - 200,000đ</option>
            <option value="500000">Gói Vĩnh Viễn - 500,000đ</option>
        </select>

        <div class="hwid-row" onclick="togglePlus()">
            <input type="checkbox" id="plus" onchange="update()" style="width:20px; height:20px; accent-color:var(--neon)">
            <label style="cursor:pointer; font-size:12px; font-weight:bold; color:var(--neon)">+20,000đ CÀI THÊM HWID
